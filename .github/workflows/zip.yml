name: Extract Special ZIPs

on:
  push:
    branches:
      - main
      - master

# Ensure it only runs after all other workflows are done
# (GitHub doesn't have a direct "wait for all workflows" mechanism, 
#  so we can emulate it using concurrency and workflow_run triggers.)
# Alternative: use `workflow_run` if you know the workflows to depend on.
concurrency:
  group: extract-zips
  cancel-in-progress: false

jobs:
  wait_for_others:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for other workflows
        run: |
          echo "Waiting for other workflows to complete..."
          # Sleep to give time for other workflows to finish
          sleep 120

  extract_zips:
    runs-on: ubuntu-latest
    needs: wait_for_others

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and extract ZIP files starting with "!"
        run: |
          echo "Looking for ZIP files starting with '!'..."
          found=0
          while IFS= read -r zipfile; do
            echo "Extracting: $zipfile"
            dir=$(dirname "$zipfile")
            unzip -o "$zipfile" -d "$dir"
            rm "$zipfile"
            found=1
          done < <(git diff --name-only HEAD~1 HEAD | grep '^.*!.*\.zip$' || true)

          if [ $found -eq 0 ]; then
            echo "No matching ZIP files found."
            exit 0
          fi

      - name: Commit and push extracted content
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Extracted and removed special ZIP files"
          git push
