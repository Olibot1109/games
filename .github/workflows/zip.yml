name: Extract Special ZIPs

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: extract-zips
  cancel-in-progress: false

jobs:
  wait_for_others:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for other workflows to finish
        run: |
          echo "Waiting 2 minutes for other workflows to complete..."
          sleep 120

  extract_zips:
    runs-on: ubuntu-latest
    needs: wait_for_others

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and extract all ZIP files starting with "!"
        id: extract
        run: |
          echo "Looking for all ZIP files starting with '!'..."
          found=0
          # Find all ZIP files in the repo starting with !
          while IFS= read -r zipfile; do
            echo "Extracting: $zipfile"
            dir=$(dirname "$zipfile")
            unzip -o "$zipfile" -d "$dir"
            rm "$zipfile"
            found=1
          done < <(find . -type f -name '!*.zip' || true)

          echo "found=$found" >> $GITHUB_ENV

      - name: Commit and push extracted content
        if: env.found == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Extracted and removed special ZIP files"
          git push
