    <script type="text/javascript">
	    var isOnMobile = (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent));
	    var userLang = "en"; 
		var supportedLanguages = ["en","fr","es","de","it","pt"];
		var isSDKReady = true; 
		var isGameLoaded = false;
		var preLoadingProgress = 0;
		var isSpinnerDisplaying = true;

		function detectLanguage(argument) {
			userLang = navigator.language || navigator.userLanguage;
			if(userLang)
			{
				if(userLang.includes("-"))
				{
					userLang = userLang.split("-")[0];
				}
			}
			else
			{
				userLang = "en";
			}
			for(var no=0; no<supportedLanguages.length; no++)
			{
				if(userLang.includes(supportedLanguages[no]))
				{
					userLang = supportedLanguages[no];
					no = supportedLanguages.length;
				}
			}
			console.log("User Languauge " + userLang);
		}

		function onPageReady()
		{
			gameScreens[SCREENs.ROTATE] = document.getElementById("screen_"+SCREENs.ROTATE);
			Resize();
		}

		function On_GameLoadingStart()
		{
			if(isSpinnerDisplaying)
			{
				isSpinnerDisplaying = false;
				document.getElementById("spinner").innertHTML = '';
				document.getElementById("spinner").style.display = "none";
				document.getElementById("logo").style.display = "none";
				detectLanguage();
				c2_callFunction("Set_NavLanguage",[userLang]);
			}
		}
	
		function Update_LoadingProgress(progress)
		{
			if(isSpinnerDisplaying)
			{
				isSpinnerDisplaying = false;
				document.getElementById("spinner").innertHTML = '';
				document.getElementById("spinner").style.display = "none";
				document.getElementById("logo").style.display = "none";
				detectLanguage();
				c2_callFunction("Set_NavLanguage",[userLang]);
			}
			if(preLoadingProgress == progress)
				return;
			preLoadingProgress = progress;
			if(!isSDKReady)
				return;
			var data = {};
			data.percentageDone = progress;
		}

		function On_GameLoaded()
		{
			console.log("Game Loaded");
			isGameLoaded = true;
		}
	</script>

	<script type="text/javascript">
		var gameScreens = {};
		const SCREENs = {
		    ROTATE : "rotate"
		}


		var ORIENTATIONs = {
			PORTRAIT : 0,
			LANDSCAPE : 1,
			BOTH : 2
		}
		const RESCALE_MODEs = {
			WIDTH : 0,
			HEIGHT : 1,
			MIN : 2,
			MAX : 3,
			VALUE : 4
		}

		var UI_SCALE = 0.75;
		var CANVAS_WIDTH = 1920;
		var CANVAS_HEIGHT = 1080;
		var rescaleMode = RESCALE_MODEs.MIN;
		var screenOrientation = ORIENTATIONs.LANDSCAPE;
		var CANVAS_AspectRatio = CANVAS_WIDTH/CANVAS_HEIGHT;
		var aspectRatio = 0;
		var screenWidth = 0;
		var screenHeight = 0;

		function Resize()
		{
			screenWidth = Math.max(document.documentElement.clientWidth, window.innerWidth || 0);
			screenHeight= Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
			aspectRatio = screenWidth/screenHeight;
			console.log(screenWidth +"<>"+ screenHeight);
			switch(rescaleMode)
			{
				case RESCALE_MODEs.WIDTH:
				UI_SCALE = screenWidth/CANVAS_WIDTH;
				break;
				case RESCALE_MODEs.HEIGHT:
				UI_SCALE = screenHeight/CANVAS_HEIGHT;
				break;
				case RESCALE_MODEs.MIN:
				UI_SCALE = Math.min(screenWidth/CANVAS_WIDTH,screenHeight/CANVAS_HEIGHT)
				break;
				case RESCALE_MODEs.MAX:
				UI_SCALE = Math.max(screenWidth/CANVAS_WIDTH,screenHeight/CANVAS_HEIGHT)
				break;
			}
			UI_SCALE = UI_SCALE.toFixed(2);
			if(isOnMobile)
			{
				if(!gameScreens[SCREENs.ROTATE])
					return;
				switch(screenOrientation)
				{

					case ORIENTATIONs.PORTRAIT:
					if(screenWidth > screenHeight)
						gameScreens[SCREENs.ROTATE].style.display = "block";	
					else
						gameScreens[SCREENs.ROTATE].style.display = "none";
					
					break;

					case ORIENTATIONs.LANDSCAPE:
					if(screenHeight > screenWidth)
						gameScreens[SCREENs.ROTATE].style.display = "block";	
					else
						gameScreens[SCREENs.ROTATE].style.display = "none";
					break;
				}
			}
		}
		window.addEventListener('resize', function(event){
		  Resize();
		});
	</script>
