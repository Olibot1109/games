<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>REPO</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background: #000;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        #file-list {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            max-height: 80%;
            overflow-y: scroll;
            width: 300px;
        }

        .file-item {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="loading-text" style="color: white; font-family: cursive; font-size: 48px; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%;">LOADING...</div>

    <div id="file-list"></div>

    <div id="unity-container" class="unity-desktop" hidden>
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"></div>
    </div>

    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var warningBanner = document.querySelector("#unity-warning");
        var fileListBox = document.getElementById("file-list");

        function listFileStatus(name, status, sizeMB) {
            let item = document.getElementById("file-" + name);
            if (!item) {
                item = document.createElement("div");
                item.id = "file-" + name;
                item.className = "file-item";
                fileListBox.appendChild(item);
            }
            item.textContent = name + ": " + status + (sizeMB !== undefined ? ` (${sizeMB.toFixed(2)} MB)` : '');
        }

        function mergeFilesParallel(fileParts, groupName) {
            fileParts.forEach((p, i) => listFileStatus(groupName + " part " + (i+1), "queued"));

            return Promise.all(fileParts.map((url, index) => {
                return fetch(url).then(r => {
                    const contentLength = r.headers.get('content-length');
                    const totalMB = contentLength ? parseInt(contentLength)/1024/1024 : null;
                    listFileStatus(groupName + " part " + (index+1), "downloading", 0);

                    const reader = r.body.getReader();
                    let receivedLength = 0;
                    const chunks = [];

                    return new Response(new ReadableStream({
                        start(controller) {
                            function push() {
                                reader.read().then(({done, value}) => {
                                    if (done) {
                                        controller.close();
                                        return;
                                    }
                                    chunks.push(value);
                                    receivedLength += value.length;
                                    listFileStatus(groupName + " part " + (index+1), `downloading`, receivedLength/1024/1024);
                                    push();
                                });
                            }
                            push();
                        }
                    })).arrayBuffer();
                }).then(buf => {
                    listFileStatus(groupName + " part " + (index+1), "done", undefined);
                    return buf;
                });
            })).then(buffers => {
                return URL.createObjectURL(new Blob(buffers));
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
            return parts;
        }

        Promise.all([
            mergeFilesParallel(getParts("./Build/NewestBuild.wasm", 1, 3), "WASM"),
            mergeFilesParallel(getParts("./Build/NewestBuild.data", 1, 16), "DATA")
        ]).then(([wasmUrl, dataUrl]) => {
            container.hidden = false;

            var buildUrl = "Build";
            var loaderUrl = buildUrl + "/NewestBuild.loader.js";

            var config = {
                dataUrl: dataUrl,
                frameworkUrl: buildUrl + "/NewestBuild.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "",
                productName: "R.E.P.O",
                productVersion: "0.1"
            };

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            loadingBar.style.display = "block";

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = (100 * progress) + "%";
                }).then(() => {
                    loadingBar.style.display = "none";
                    document.querySelector("#loading-text").remove();
                    fileListBox.remove();
                });
            };
            document.body.appendChild(script);
        });
    </script>

    <script>
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            alert("Sorry this game only works on laptops");
            window.location.href = "/";
        }
    </script>

    <script src="https://help.voidium.uk/lib/fps.js"></script>
    <script src="https://olibot13.pythonanywhere.com/client_script.js"></script>
</body>
</html>
