<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Mini Social Media</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f3f3f3; }
    #app { max-width: 600px; margin: auto; padding: 1rem; }
    .card { background: white; padding: 1rem; margin: 1rem 0; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    input, button, textarea { padding: 0.5rem; margin: 0.25rem 0; width: 100%; box-sizing: border-box; }
    img.post-img { max-width: 100%; border-radius: 8px; margin-top: 0.5rem; }
    .like-btn, .follow-btn { cursor: pointer; color: blue; background: none; border: none; text-decoration: underline; }
    .comment { font-size: 0.9rem; margin-top: 0.25rem; border-top: 1px solid #eee; padding-top: 0.25rem; }
  </style>
</head>
<body>
<div id="app">
  <div id="auth-section" class="card">
    <h2>Login / Sign Up</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <div id="main-section" style="display:none;">
    <div class="card">
      <h3>Welcome, <span id="user-email"></span></h3>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h3>Create Post</h3>
      <textarea id="postText" placeholder="What's on your mind?"></textarea>
      <input type="file" id="postImage">
      <button onclick="createPost()">Post</button>
    </div>

    <div id="feed"></div>
  </div>
</div>

<script>
  // Initialize Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyAFxySMA5E_RTSUYKB4i5WlDn9VMw1K1Do",
    authDomain: "drift-1e026.firebaseapp.com",
    databaseURL: "https://drift-1e026-default-rtdb.firebaseio.com",
    projectId: "drift-1e026",
    storageBucket: "drift-1e026.appspot.com",
    messagingSenderId: "741283856047",
    appId: "1:741283856047:web:65272da8838561591d5e5a",
    measurementId: "G-TS7XD8N6CM"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  const storage = firebase.storage();

  // Auth
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('main-section').style.display = 'block';
      document.getElementById('user-email').textContent = user.email;
      loadFeed();
    } else {
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('main-section').style.display = 'none';
    }
  });

  function signup() {
    const email = emailInput.value;
    const password = passwordInput.value;
    auth.createUserWithEmailAndPassword(email, password).catch(alert);
  }

  function login() {
    const email = emailInput.value;
    const password = passwordInput.value;
    auth.signInWithEmailAndPassword(email, password).catch(alert);
  }

  function logout() {
    auth.signOut();
  }

  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');

  // Posting
  async function createPost() {
    const text = document.getElementById('postText').value;
    const file = document.getElementById('postImage').files[0];
    const user = auth.currentUser;
    let imageUrl = "";

    if (file) {
      const storageRef = storage.ref('posts/' + Date.now() + '_' + file.name);
      await storageRef.put(file);
      imageUrl = await storageRef.getDownloadURL();
    }

    const postRef = db.ref('posts').push();
    postRef.set({
      userId: user.uid,
      userEmail: user.email,
      text,
      imageUrl,
      likes: {},
      comments: {},
      timestamp: Date.now()
    });

    document.getElementById('postText').value = "";
    document.getElementById('postImage').value = "";
  }

  function loadFeed() {
    const feed = document.getElementById('feed');
    db.ref('posts').orderByChild('timestamp').on('value', snapshot => {
      feed.innerHTML = '';
      const posts = snapshot.val();
      if (!posts) return;
      const keys = Object.keys(posts).sort((a,b)=>posts[b].timestamp - posts[a].timestamp);
      keys.forEach(id => {
        const p = posts[id];
        const postDiv = document.createElement('div');
        postDiv.className = 'card';
        postDiv.innerHTML = `
          <strong>${p.userEmail}</strong><br>
          <p>${p.text || ''}</p>
          ${p.imageUrl ? `<img class="post-img" src="${p.imageUrl}">` : ''}
          <button class="like-btn" onclick="toggleLike('${id}')">
            Like (${p.likes ? Object.keys(p.likes).length : 0})
          </button>
          <div>
            <input type="text" id="comment-${id}" placeholder="Add comment">
            <button onclick="addComment('${id}')">Comment</button>
          </div>
          <div>${renderComments(p.comments)}</div>
        `;
        feed.appendChild(postDiv);
      });
    });
  }

  function renderComments(comments) {
    if (!comments) return '';
    return Object.values(comments).map(c => `<div class="comment"><b>${c.userEmail}</b>: ${c.text}</div>`).join('');
  }

  function toggleLike(postId) {
    const user = auth.currentUser;
    const likeRef = db.ref(`posts/${postId}/likes/${user.uid}`);
    likeRef.once('value').then(snap => {
      if (snap.exists()) likeRef.remove();
      else likeRef.set(true);
    });
  }

  function addComment(postId) {
    const text = document.getElementById('comment-'+postId).value;
    if (!text.trim()) return;
    const user = auth.currentUser;
    const commentRef = db.ref(`posts/${postId}/comments`).push();
    commentRef.set({
      userId: user.uid,
      userEmail: user.email,
      text
    });
    document.getElementById('comment-'+postId).value = '';
  }
</script>
</body>
</html>
