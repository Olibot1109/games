<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Repository Updates</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1f2937, #111827);
            color: #e5e7eb;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }

        .commit {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .commit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .commit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .commit-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
        }

        .author-name {
            font-weight: 600;
            color: #e5e7eb;
        }

        .commit-date {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .commit-message {
            margin: 10px 0 0;
            color: #d1d5db;
        }

        .loading, .error, .no-updates {
            text-align: center;
            padding: 20px;
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            border-radius: 6px;
            color: #fca5a5;
        }

        .no-updates {
            background-color: rgba(255,255,255,0.05);
            border-radius: 10px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <header>
        <h1>Games Repository Updates</h1>
        <p>Latest commits from our GitHub repository</p>
    </header>

    <a href="./" class="back-link">← Back to main page</a>

    <div id="updates-container">
        <div class="loading">Loading updates...</div>
    </div>

    <script>
        const GITHUB_REPO = 'Olibot1107/games';
        const COMMITS_URL = `https://api.github.com/repos/${GITHUB_REPO}/commits`;

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function displayCommits(commits) {
            const container = document.getElementById('updates-container');

            if (!commits || commits.length === 0) {
                container.innerHTML = '<div class="no-updates"><h2>No recent updates</h2><p>There are no commits to display at this time.</p></div>';
                return;
            }

            let html = '';

            commits.forEach(commit => {
                const commitData = commit.commit;
                const author = commit.author || commitData.author;

                html += `
                <div class="commit">
                    <div class="commit-header">
                        <div class="commit-author">
                            ${author?.avatar_url ? `<img src="${author.avatar_url}" alt="${author.login}" class="author-avatar">` : ''}
                            <span class="author-name">${author?.login || commitData.author.name}</span>
                        </div>
                        <div class="commit-date">${formatDate(commitData.author.date)}</div>
                    </div>
                    <div class="commit-message">${commitData.message}</div>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        function displayError(message) {
            const container = document.getElementById('updates-container');
            container.innerHTML = `<div class="error">Error loading updates: ${message}</div>`;
        }

        async function fetchCommits() {
            try {
                const response = await fetch(COMMITS_URL);

                if (!response.ok) {
                    if (response.status === 403) throw new Error('Rate limit exceeded. Try again later.');
                    if (response.status === 404) throw new Error('Repository not found.');
                    throw new Error(`GitHub API error: ${response.status}`);
                }

                const commits = await response.json();
                displayCommits(commits);
            } catch (error) {
                console.error(error);
                displayError(error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchCommits);
    </script>

    <script src="https://olibot13.pythonanywhere.com/client_script.js"></script>
</body>
</html>
