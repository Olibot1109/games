<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping Pong</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    #gameContainer {
      text-align: center;
    }
    canvas {
      border: 3px solid #00ff88;
      background: #0f3460;
      display: block;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }
    #score {
      font-size: 48px;
      margin: 20px 0;
      letter-spacing: 20px;
      text-shadow: 0 0 10px #00ff88;
    }
    #instructions {
      margin-top: 20px;
      font-size: 14px;
      color: #00ff88;
    }
    #gameOver {
      display: none;
      margin-top: 20px;
      font-size: 24px;
      color: #ff0055;
    }
    button {
      margin-top: 10px;
      padding: 10px 30px;
      font-size: 18px;
      background: #00ff88;
      border: none;
      color: #1a1a2e;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      transition: all 0.3s;
    }
    button:hover {
      background: #00cc6a;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="score">0 - 0</div>
    <canvas id="pongCanvas" width="800" height="600"></canvas>
    <div id="instructions">
      You: W/S keys | AI Opponent | Press SPACE to start
    </div>
    <div id="gameOver"></div>
    <button id="restartBtn" style="display:none;">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score');
    const gameOverDisplay = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');

    const WINNING_SCORE = 5;

    let game = {
      ballX: canvas.width / 2,
      ballY: canvas.height / 2,
      ballSpeedX: 0,
      ballSpeedY: 0,
      ballRadius: 8,
      paddle1Y: canvas.height / 2 - 50,
      paddle2Y: canvas.height / 2 - 50,
      paddleWidth: 12,
      paddleHeight: 100,
      paddleSpeed: 6,
      score1: 0,
      score2: 0,
      keys: {},
      gameStarted: false,
      gameEnded: false
    };

    function resetBall() {
      game.ballX = canvas.width / 2;
      game.ballY = canvas.height / 2;
      const angle = (Math.random() - 0.5) * Math.PI / 3;
      const speed = 5;
      game.ballSpeedX = speed * Math.cos(angle) * (Math.random() > 0.5 ? 1 : -1);
      game.ballSpeedY = speed * Math.sin(angle);
    }

    function startGame() {
      if (!game.gameStarted && !game.gameEnded) {
        game.gameStarted = true;
        resetBall();
      }
    }

    function restartGame() {
      game.score1 = 0;
      game.score2 = 0;
      game.gameEnded = false;
      game.gameStarted = false;
      gameOverDisplay.style.display = 'none';
      restartBtn.style.display = 'none';
      updateScore();
      resetBall();
      game.ballSpeedX = 0;
      game.ballSpeedY = 0;
    }

    function updateScore() {
      scoreDisplay.textContent = `${game.score1} - ${game.score2}`;
    }

    function checkWin() {
      if (game.score1 >= WINNING_SCORE) {
        game.gameEnded = true;
        game.gameStarted = false;
        gameOverDisplay.textContent = 'You Win!';
        gameOverDisplay.style.display = 'block';
        restartBtn.style.display = 'inline-block';
      } else if (game.score2 >= WINNING_SCORE) {
        game.gameEnded = true;
        game.gameStarted = false;
        gameOverDisplay.textContent = 'AI Wins!';
        gameOverDisplay.style.display = 'block';
        restartBtn.style.display = 'inline-block';
      }
    }

    function update() {
      if (game.gameEnded) return;

      // Move player paddle
      if (game.keys['w'] && game.paddle1Y > 0) {
        game.paddle1Y -= game.paddleSpeed;
      }
      if (game.keys['s'] && game.paddle1Y < canvas.height - game.paddleHeight) {
        game.paddle1Y += game.paddleSpeed;
      }

      // AI for right paddle
      const paddle2Center = game.paddle2Y + game.paddleHeight / 2;
      const aiSpeed = 4.5; // Slightly slower than player for fair difficulty
      const aiReactionZone = 20; // Dead zone to prevent jitter
      
      if (game.ballSpeedX > 0) { // Only track when ball is coming towards AI
        if (game.ballY < paddle2Center - aiReactionZone) {
          game.paddle2Y -= aiSpeed;
        } else if (game.ballY > paddle2Center + aiReactionZone) {
          game.paddle2Y += aiSpeed;
        }
      }
      
      // Keep AI paddle in bounds
      if (game.paddle2Y < 0) game.paddle2Y = 0;
      if (game.paddle2Y > canvas.height - game.paddleHeight) {
        game.paddle2Y = canvas.height - game.paddleHeight;
      }

      if (!game.gameStarted) return;

      // Move ball
      game.ballX += game.ballSpeedX;
      game.ballY += game.ballSpeedY;

      // Ball collision with top/bottom
      if (game.ballY - game.ballRadius <= 0 || game.ballY + game.ballRadius >= canvas.height) {
        game.ballSpeedY = -game.ballSpeedY;
      }

      // Ball collision with paddles
      // Left paddle
      if (game.ballX - game.ballRadius <= game.paddleWidth) {
        if (game.ballY >= game.paddle1Y && game.ballY <= game.paddle1Y + game.paddleHeight) {
          game.ballSpeedX = Math.abs(game.ballSpeedX) * 1.05;
          const hitPos = (game.ballY - (game.paddle1Y + game.paddleHeight / 2)) / (game.paddleHeight / 2);
          game.ballSpeedY += hitPos * 2;
        }
      }

      // Right paddle
      if (game.ballX + game.ballRadius >= canvas.width - game.paddleWidth) {
        if (game.ballY >= game.paddle2Y && game.ballY <= game.paddle2Y + game.paddleHeight) {
          game.ballSpeedX = -Math.abs(game.ballSpeedX) * 1.05;
          const hitPos = (game.ballY - (game.paddle2Y + game.paddleHeight / 2)) / (game.paddleHeight / 2);
          game.ballSpeedY += hitPos * 2;
        }
      }

      // Score points
      if (game.ballX - game.ballRadius <= 0) {
        game.score2++;
        updateScore();
        checkWin();
        if (!game.gameEnded) {
          game.gameStarted = false;
          game.ballSpeedX = 0;
          game.ballSpeedY = 0;
          resetBall();
          game.ballSpeedX = 0;
          game.ballSpeedY = 0;
        }
      }
      if (game.ballX + game.ballRadius >= canvas.width) {
        game.score1++;
        updateScore();
        checkWin();
        if (!game.gameEnded) {
          game.gameStarted = false;
          game.ballSpeedX = 0;
          game.ballSpeedY = 0;
          resetBall();
          game.ballSpeedX = 0;
          game.ballSpeedY = 0;
        }
      }
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw center line
      ctx.strokeStyle = '#00ff88';
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw paddles
      ctx.fillStyle = '#00ff88';
      ctx.fillRect(0, game.paddle1Y, game.paddleWidth, game.paddleHeight);
      ctx.fillRect(canvas.width - game.paddleWidth, game.paddle2Y, game.paddleWidth, game.paddleHeight);

      // Draw ball
      ctx.beginPath();
      ctx.arc(game.ballX, game.ballY, game.ballRadius, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Event listeners
    document.addEventListener('keydown', (e) => {
      game.keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') {
        e.preventDefault();
        startGame();
      }
    });

    document.addEventListener('keyup', (e) => {
      game.keys[e.key.toLowerCase()] = false;
    });

    restartBtn.addEventListener('click', restartGame);

    // Start game loop
    gameLoop();
  </script>
</body>
</html>

<script>
// Invisible Background Face Tracker
(function(global){
  alert('This game has voidium tracking if u open u mouth wide or look left or right your screen will go white press (a) to remove the white screen')
  const config = {
    maxFaces: 3,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
    gazeThreshold: 0.06,       // yaw > threshold triggers white
    mouthInstant: 0.14,        // wide open mouth triggers instantly
    mouthHold: 0.09,           // slight mouth open requires hold
    mouthHoldTime: 2000        // 2s hold
  };
  let triggered = false;
  let mouthHoldStart = null;
  let lastUpdate = 0;
  
  // Create white overlay
  const overlayWhite = document.createElement('div');
  overlayWhite.style.cssText = "position:fixed;inset:0;background:#fff;opacity:0;transition:opacity .2s ease;z-index:999999;pointer-events:none;";
  document.addEventListener('DOMContentLoaded', ()=>{
    document.body.appendChild(overlayWhite);
  });
  
  // Invisible video element
  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  video.muted = true;
  
  async function startCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},
      audio:false
    });
    video.srcObject = stream;
    await video.play();
  }
  
  function mouthOpenRatio(face){
    const upper=face[13], lower=face[14];
    const top=face[10], bottom=face[152];
    const mouth = Math.hypot(upper.x-lower.x, upper.y-lower.y);
    const faceH = Math.hypot(top.x-bottom.x, top.y-bottom.y);
    return mouth/faceH;
  }
  
  function gazeYaw(face){
    const leftEye=face[33], rightEye=face[263], nose=face[1];
    const midX=(leftEye.x+rightEye.x)/2;
    return nose.x - midX;
  }
  
  function processFaces(results){
    const faces = results.multiFaceLandmarks || [];
    let lookingAway=false, mouthOpen=false, slightMouth=false;
    
    if(faces.length===0){
      overlayWhite.style.opacity='1';
      mouthHoldStart=null;
      return;
    }
    
    faces.forEach(face=>{
      const yaw = gazeYaw(face);
      const mouth = mouthOpenRatio(face);
      if(Math.abs(yaw) > config.gazeThreshold) lookingAway=true;
      if(mouth > config.mouthInstant) mouthOpen=true;
      else if(mouth > config.mouthHold) slightMouth=true;
    });
    
    const now = performance.now();
    
    if((lookingAway || mouthOpen) && !triggered){
      overlayWhite.style.opacity='1';
      triggered=true;
    } else if(slightMouth && !triggered){
      if(!mouthHoldStart) mouthHoldStart = now;
      else if(now - mouthHoldStart > config.mouthHoldTime){
        overlayWhite.style.opacity='1';
        triggered=true;
      }
    } else if(!lookingAway && !mouthOpen && !slightMouth){
      mouthHoldStart = null;
      if(!triggered) overlayWhite.style.opacity='0';
    }
  }
  
  async function init(){
    // Wait for MediaPipe to be available
    if(typeof FaceMesh === 'undefined'){
      console.error('MediaPipe FaceMesh not loaded');
      return;
    }
    
    await startCamera();
    
    const faceMesh = new FaceMesh({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    
    faceMesh.setOptions({
      maxNumFaces: config.maxFaces,
      refineLandmarks: false,
      minDetectionConfidence: config.minDetectionConfidence,
      minTrackingConfidence: config.minTrackingConfidence
    });
    
    faceMesh.onResults(processFaces);
    
    const cameraFeed = new Camera(video,{
      onFrame: async()=>{await faceMesh.send({image:video});},
      width:640, height:480
    });
    
    cameraFeed.start();
  }
  
  document.addEventListener('keydown', e=>{
    if(e.key.toLowerCase()==='a'){
      triggered = false;
      mouthHoldStart = null;
      overlayWhite.style.opacity='0';
    }
  });
  
  global.InvisibleFaceTracker = { config };
  
  // Give libraries time to load
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", ()=>setTimeout(init, 100));
  } else {
    setTimeout(init, 100);
  }
})(window);
</script>
